name: CodeQL

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 18 * * 3"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    uses: teh-hippo/common-repo-configs/.github/workflows/codeql.yml@b3d0a782aa320db32e090a312e42e8da717e29b5 # v1
    permissions:
      contents: read
      security-events: write
      actions: read
    with:
      language: rust
