name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: hippobox
            os_label: linux
            archive: tar.gz
            use-cross: false
          - target: aarch64-unknown-linux-musl
            artifact: hippobox
            os_label: linux
            archive: tar.gz
            use-cross: true
          - target: x86_64-pc-windows-gnu
            artifact: hippobox.exe
            os_label: windows
            archive: zip
            use-cross: false
    name: build (${{ matrix.target }})
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl') && !matrix.use-cross
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install mingw tools
        if: contains(matrix.target, 'windows-gnu')
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Verify tag matches Cargo.toml version
        run: |
          CARGO_VER="$(sed -n 's/^version *= *"\(.*\)"/\1/p' Cargo.toml | head -1)"
          TAG_VER="${TAG#v}"
          if [ "$CARGO_VER" != "$TAG_VER" ]; then
            echo "::error::Tag ${TAG} does not match Cargo.toml version ${CARGO_VER}"
            exit 1
          fi

      - name: Build hippobox
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cargo install cross --locked
            cross build --release --target ${{ matrix.target }} -p hippobox
          else
            cargo build --release --target ${{ matrix.target }} -p hippobox
          fi

      - name: Build rename shim
        if: contains(matrix.target, 'linux') && !matrix.use-cross
        run: cargo build --release -p rename-shim

      - name: Package release
        run: |
          ARCH="${{ matrix.target }}"
          ARCH="${ARCH%%-unknown-*}"
          ARCH="${ARCH%%-pc-*}"
          mkdir -p release/bin
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} release/bin/
          if [ -f target/release/librename_shim.so ]; then
            cp target/release/librename_shim.so release/bin/
          fi
          cd release
          ARCHIVE_NAME="hippobox-${TAG}-${ARCH}-${{ matrix.os_label }}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -r "../${ARCHIVE_NAME}.zip" *
          else
            tar czf "../${ARCHIVE_NAME}.tar.gz" *
          fi
          cd ..
          sha256sum "${ARCHIVE_NAME}."* >> checksums-sha256.txt

      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hippobox-${{ env.TAG }}-*
            checksums-sha256.txt

  publish:
    needs: build
    runs-on: ubuntu-24.04
    environment: crates-io
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish to crates.io
        run: cargo publish -p hippobox --locked --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
