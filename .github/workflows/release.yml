name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Verify tag matches Cargo.toml version
        run: |
          CARGO_VER="$(sed -n 's/^version *= *"\(.*\)"/\1/p' Cargo.toml | head -1)"
          TAG_VER="${TAG#v}"
          if [ "$CARGO_VER" != "$TAG_VER" ]; then
            echo "::error::Tag ${TAG} does not match Cargo.toml version ${CARGO_VER}"
            exit 1
          fi

      - name: Build hippobox (static musl)
        run: cargo build --release --target x86_64-unknown-linux-musl -p hippobox

      - name: Build rename shim
        run: cargo build --release -p rename-shim

      - name: Package release
        run: |
          mkdir -p release
          cp target/x86_64-unknown-linux-musl/release/hippobox release/
          cp target/release/librename_shim.so release/
          cd release
          tar czf "../hippobox-${TAG}-x86_64-linux.tar.gz" *
          cd ..
          sha256sum "hippobox-${TAG}-x86_64-linux.tar.gz" > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            hippobox-${{ env.TAG }}-x86_64-linux.tar.gz
            checksums-sha256.txt
          generate_release_notes: true

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable

      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth

      - name: Publish to crates.io
        run: cargo publish -p hippobox --locked --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
