name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    strategy:
      matrix:
        include:
          - { name: fmt,     cmd: "cargo fmt --check -p hippobox" }
          - { name: clippy,  cmd: "cargo clippy -p hippobox -- -D warnings" }
          - { name: test,    cmd: "cargo test -p hippobox" }
          - { name: publish, cmd: "cargo publish -p hippobox --dry-run --locked" }
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: ${{ matrix.cmd }}

  cross-check:
    name: cross (aarch64-unknown-linux-gnu)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: aarch64-unknown-linux-gnu
      - name: Cross check
        run: |
          cargo install cross --locked
          cross check -p hippobox --target aarch64-unknown-linux-gnu
