name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    strategy:
      matrix:
        include:
          - { name: fmt,     cmd: "cargo fmt --check -p hippobox" }
          - { name: clippy,  cmd: "cargo clippy -p hippobox -- -D warnings" }
          - { name: test,    cmd: "cargo test -p hippobox" }
          - { name: publish, cmd: "cargo publish -p hippobox --dry-run --locked" }
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: ${{ matrix.cmd }}

  cross-check:
    name: cross (aarch64-unknown-linux-gnu)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-unknown-linux-gnu
      - name: Cross check
        run: |
          cargo install cross --locked
          cross check -p hippobox --target aarch64-unknown-linux-gnu
