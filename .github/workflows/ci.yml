name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    strategy:
      matrix:
        include:
          - { name: fmt,     cmd: "cargo fmt --check -p hippobox" }
          - { name: clippy,  cmd: "cargo clippy -p hippobox -- -D warnings" }
          - { name: test,    cmd: "cargo test -p hippobox" }
          - { name: publish, cmd: "cargo publish -p hippobox --dry-run --locked" }
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: ${{ matrix.cmd }}

  cross-check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: aarch64-unknown-linux-gnu, use-cross: true }
          - { target: x86_64-pc-windows-gnu,    use-cross: false }
    name: cross (${{ matrix.target }})
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross-compilation tools
        run: |
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-gnu" ]; then
            sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64
          fi
      - name: Check
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cargo install cross --locked
            cross check -p hippobox --target ${{ matrix.target }}
          else
            cargo check -p hippobox --target ${{ matrix.target }}
          fi
